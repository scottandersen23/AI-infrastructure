apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ai-platform
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: ai-platform
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
