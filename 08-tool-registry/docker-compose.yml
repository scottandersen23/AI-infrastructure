services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tools
      POSTGRES_PASSWORD: tools
      POSTGRES_DB: tools
    ports:
      - "5434:5432"
    volumes:
      - tool_registry_postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tools -d tools"]
      interval: 5s
      timeout: 5s
      retries: 5

  registry:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://tools:tools@postgres:5432/tools
      SERVICE_NAME: tool-registry-api
      ENVIRONMENT: local
      OTEL_EXPORTER: ${OTEL_EXPORTER:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    ports:
      - "8009:8009"
    environment:
      REGISTRY_URL: http://registry:8008
      DATABASE_URL: postgresql://tools:tools@postgres:5432/tools
      SERVICE_NAME: tool-executor
      ENVIRONMENT: local
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://host.docker.internal:8012}
      METRICS_URL: ${METRICS_URL:-http://host.docker.internal:8010}
      JOBS_API_URL: ${JOBS_API_URL:-http://host.docker.internal:8010}
      OTEL_EXPORTER: ${OTEL_EXPORTER:-console}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      registry:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  tool_registry_postgres_data:
