apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability
  namespace: capstone-ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability
  template:
    metadata:
      labels:
        app: observability
    spec:
      containers:
        - name: observability
          image: capstone/observability:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8013
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8013
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: observability
  namespace: capstone-ai-platform
spec:
  selector:
    app: observability
  ports:
    - name: http
      port: 80
      targetPort: 8013
