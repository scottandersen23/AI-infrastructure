apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: capstone-ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: capstone/rag-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8012
          envFrom:
            - configMapRef:
                name: capstone-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: capstone-ai-platform
spec:
  selector:
    app: rag-service
  ports:
    - name: http
      port: 80
      targetPort: 8012
